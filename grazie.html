<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie — AI Som</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#1C1C1C;color:#C0B0A0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px}
:root{--copper:#D4A85A;--font-d:'DM Serif Display',Georgia,serif}
.wrap{max-width:560px}
.icon{font-size:4rem;margin-bottom:32px}
h1{font-family:var(--font-d);font-size:3rem;font-weight:400;color:#fff;margin-bottom:16px}
h1 em{font-style:italic;color:var(--copper)}
p{font-size:1.05rem;color:rgba(255,255,255,0.5);line-height:1.8;margin-bottom:40px}
a{display:inline-flex;align-items:center;gap:8px;background:var(--copper);color:#1C1C1C;padding:14px 32px;border-radius:100px;font-weight:600;font-size:0.92rem;text-decoration:none;transition:0.25s ease}
a:hover{background:#B8903E;transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🍷</div>
  <h1>Grazie per<br><em>averci scritto</em></h1>
  <p>Abbiamo ricevuto la tua richiesta.<br>Ti risponderemo entro 24 ore per concordare la call conoscitiva.</p>
  <a href="index.html">← Torna alla homepage</a>
</div>
</body>
</html>
